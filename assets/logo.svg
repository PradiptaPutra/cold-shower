<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">

  <!-- Background -->
  <circle cx="100" cy="100" r="98" fill="#0d1b2e"/>
  <circle cx="100" cy="100" r="96" fill="none" stroke="#1e40af" stroke-width="2"/>

  <!-- Pipe arm -->
  <line x1="145" y1="38" x2="110" y2="68" stroke="#3b82f6" stroke-width="8" stroke-linecap="round"/>

  <!-- Showerhead — flat disc -->
  <rect x="72" y="64" width="64" height="18" rx="9" fill="#2563eb"/>

  <!-- Spray holes -->
  <circle cx="84"  cy="73" r="2.5" fill="#93c5fd"/>
  <circle cx="96"  cy="73" r="2.5" fill="#93c5fd"/>
  <circle cx="108" cy="73" r="2.5" fill="#93c5fd"/>
  <circle cx="120" cy="73" r="2.5" fill="#93c5fd"/>
  <circle cx="132" cy="73" r="2.5" fill="#93c5fd"/>

  <!-- Water streams — 5 clean vertical lines -->
  <line x1="84"  y1="84" x2="76"  y2="152" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
  <line x1="96"  y1="84" x2="90"  y2="152" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
  <line x1="108" y1="84" x2="104" y2="152" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
  <line x1="120" y1="84" x2="118" y2="152" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
  <line x1="132" y1="84" x2="132" y2="152" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>

  <!-- Droplets at bottom -->
  <ellipse cx="76"  cy="156" rx="3" ry="4" fill="#93c5fd"/>
  <ellipse cx="90"  cy="157" rx="3" ry="4" fill="#93c5fd"/>
  <ellipse cx="104" cy="157" rx="3" ry="4" fill="#93c5fd"/>
  <ellipse cx="118" cy="157" rx="3" ry="4" fill="#93c5fd"/>
  <ellipse cx="132" cy="156" rx="3" ry="4" fill="#93c5fd"/>

</svg>
