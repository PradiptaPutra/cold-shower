<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2e"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="headGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="120" cy="120" r="118" fill="url(#bgGrad)"/>
  <circle cx="120" cy="120" r="116" fill="none" stroke="#1e40af" stroke-width="2.5"/>

  <!-- Pipe arm (top-right diagonal) -->
  <line x1="188" y1="28" x2="148" y2="66" stroke="#3b82f6" stroke-width="9" stroke-linecap="round"/>
  <line x1="188" y1="28" x2="148" y2="66" stroke="#60a5fa" stroke-width="4" stroke-linecap="round"/>

  <!-- Showerhead body (round disc) -->
  <ellipse cx="136" cy="78" rx="34" ry="20" fill="url(#headGrad)" stroke="#3b82f6" stroke-width="2.5"/>
  <!-- Inner rim -->
  <ellipse cx="136" cy="78" rx="28" ry="15" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>

  <!-- Spray holes (3x3 grid on face of head) -->
  <g fill="#93c5fd" filter="url(#glow)">
    <circle cx="122" cy="75" r="2.8"/>
    <circle cx="133" cy="73" r="2.8"/>
    <circle cx="144" cy="74" r="2.8"/>
    <circle cx="118" cy="82" r="2.8"/>
    <circle cx="129" cy="81" r="2.8"/>
    <circle cx="140" cy="80" r="2.8"/>
    <circle cx="151" cy="80" r="2.8"/>
    <circle cx="125" cy="88" r="2.8"/>
    <circle cx="136" cy="87" r="2.8"/>
    <circle cx="147" cy="87" r="2.8"/>
  </g>

  <!-- Water streams (angled left-downward, fan pattern) -->
  <g stroke-linecap="round">
    <!-- Primary streams -->
    <line x1="106" y1="96"  x2="58"  y2="164" stroke="#60a5fa" stroke-width="2.5" opacity="0.95"/>
    <line x1="116" y1="97"  x2="72"  y2="168" stroke="#60a5fa" stroke-width="2.5" opacity="0.9"/>
    <line x1="126" y1="97"  x2="88"  y2="170" stroke="#60a5fa" stroke-width="2.5" opacity="0.9"/>
    <line x1="136" y1="96"  x2="104" y2="168" stroke="#60a5fa" stroke-width="2.5" opacity="0.85"/>
    <line x1="146" y1="95"  x2="120" y2="166" stroke="#60a5fa" stroke-width="2.5" opacity="0.8"/>
    <line x1="156" y1="93"  x2="136" y2="162" stroke="#60a5fa" stroke-width="2"   opacity="0.7"/>
    <!-- Secondary streams (lighter) -->
    <line x1="100" y1="98"  x2="48"  y2="162" stroke="#93c5fd" stroke-width="1.5" opacity="0.5"/>
    <line x1="121" y1="99"  x2="80"  y2="172" stroke="#93c5fd" stroke-width="1.5" opacity="0.45"/>
    <line x1="141" y1="98"  x2="112" y2="172" stroke="#93c5fd" stroke-width="1.5" opacity="0.4"/>
    <line x1="161" y1="94"  x2="146" y2="163" stroke="#93c5fd" stroke-width="1.5" opacity="0.35"/>
  </g>

  <!-- Droplets at stream tips -->
  <g fill="#bfdbfe" opacity="0.6">
    <ellipse cx="58"  cy="166" rx="2" ry="3" transform="rotate(-55 58 166)"/>
    <ellipse cx="72"  cy="170" rx="2" ry="3" transform="rotate(-55 72 170)"/>
    <ellipse cx="88"  cy="172" rx="2" ry="3" transform="rotate(-55 88 172)"/>
    <ellipse cx="104" cy="170" rx="2" ry="3" transform="rotate(-55 104 170)"/>
    <ellipse cx="120" cy="168" rx="2" ry="3" transform="rotate(-55 120 168)"/>
    <ellipse cx="136" cy="164" rx="2" ry="3" transform="rotate(-55 136 164)"/>
  </g>

  <!-- === VIBE SCORE GAUGE === -->
  <!-- Arc track: center (120,210) radius 68, 180° semicircle -->
  <!-- From (52,210) to (188,210) going through top -->

  <!-- Track background -->
  <path d="M 52 210 A 68 68 0 0 1 188 210"
        fill="none" stroke="#1e3a5f" stroke-width="11" stroke-linecap="round"/>

  <!-- Grade segments — F→D (red), C (yellow), B→A (green) -->
  <!-- 180° arc split: 0-40% red, 40-65% yellow, 65-100% green -->
  <!-- 0%  = angle 180° → point (52,  210) -->
  <!-- 40% = angle 108° → x=120+68cos(108°)=120-21=99,  y=210-68sin(108°)=210-64.7=145 -->
  <!-- 65% = angle 63°  → x=120+68cos(63°)=120+30.8=151, y=210-68sin(63°)=210-60.6=149 -->
  <!-- 100%= angle 0°   → point (188, 210) -->

  <!-- Red: F-D (0–40%) -->
  <path d="M 52 210 A 68 68 0 0 1 99 145"
        fill="none" stroke="#ef4444" stroke-width="11" stroke-linecap="butt"/>
  <!-- Yellow: C (40–65%) -->
  <path d="M 99 145 A 68 68 0 0 1 151 149"
        fill="none" stroke="#f59e0b" stroke-width="11" stroke-linecap="butt"/>
  <!-- Green: B-A (65–100%) -->
  <path d="M 151 149 A 68 68 0 0 1 188 210"
        fill="none" stroke="#22c55e" stroke-width="11" stroke-linecap="butt"/>

  <!-- Needle pointing at 75% (B — where hukumai scored) -->
  <!-- 75% → angle = 180 - 0.75*180 = 45° -->
  <!-- tip: x=120+68cos(45°)=120+48=168, y=210-68sin(45°)=210-48=162 -->
  <line x1="120" y1="210" x2="163" y2="165"
        stroke="#f1f5f9" stroke-width="3" stroke-linecap="round"/>
  <!-- Needle base cap -->
  <circle cx="120" cy="210" r="7" fill="#f1f5f9"/>
  <circle cx="120" cy="210" r="4" fill="#1d4ed8"/>

  <!-- Grade labels -->
  <text x="38"  y="215" font-family="ui-monospace,monospace" font-size="13" font-weight="800" fill="#ef4444">F</text>
  <text x="117" y="138" font-family="ui-monospace,monospace" font-size="13" font-weight="800" fill="#f59e0b">C</text>
  <text x="193" y="215" font-family="ui-monospace,monospace" font-size="13" font-weight="800" fill="#22c55e">A</text>

  <!-- "cold-shower" label at bottom -->
  <text x="120" y="233" font-family="ui-monospace,monospace" font-size="10" font-weight="600"
        fill="#60a5fa" text-anchor="middle" letter-spacing="2">cold-shower</text>
</svg>
